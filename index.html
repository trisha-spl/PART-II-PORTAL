<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ILSFA Part II Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#0F172A;--nm:#1E293B;--nl:#334155;
  --gd:#D4AF37;--gl:#E8C84A;
  --tx:#111827;--t2:#4B5563;--t3:#9CA3AF;
  --bd:rgba(15,23,42,.08);--b2:rgba(15,23,42,.14);
  --cd:#FFFFFF;--sf:#FDFBF7;--s2:#F5F1EA;
  --ok:#F0FDF4;--ot:#166534;--ob:#16a34a;
  --wn:#FFFBEB;--wt:#92400E;--wb:#D97706;
  --er:#FEF2F2;--et:#991B1B;--eb:#DC2626;
  --bm:#4a9abe;
  --r:10px;--rl:16px;
  --glass:rgba(255,255,255,.8);--gborder:rgba(255,255,255,.6);
  --gshadow:0 2px 20px rgba(15,23,42,.07),0 1px 4px rgba(15,23,42,.04);
  --hh:68px;--sb:232px;--max:1300px
}
html,body{height:100%;font-family:"Nunito",sans-serif;background:var(--sf);color:var(--tx);font-size:15.5px;line-height:1.7;-webkit-font-smoothing:antialiased}

.top-header{position:sticky;top:0;z-index:200;background:#0D2147;border-bottom:none}
.top-header::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.55),transparent);pointer-events:none}
.hdr{max-width:var(--max);margin:0 auto;padding:0 28px;height:var(--hh);display:flex;align-items:center;gap:20px}
.logo-d{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--gd);margin-bottom:3px;opacity:.9}
.logo-t{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1.1}
.logo-t span{color:rgba(255,255,255,.25);margin:0 6px}
.hdiv{width:1px;height:28px;background:rgba(255,255,255,.1);flex-shrink:0}
.hsrch{flex:1;max-width:420px;position:relative}
.hsrch input{width:100%;padding:10px 16px 10px 40px;border-radius:var(--rl);border:1px solid rgba(212,175,55,.12);background:rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:"Nunito",sans-serif;outline:none;transition:all .2s}
.hsrch input:focus{border-color:rgba(212,175,55,.38);background:rgba(255,255,255,.11)}
.hsrch input::placeholder{color:rgba(255,255,255,.25)}
.hsrch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:rgba(255,255,255,.3);pointer-events:none}
.hsrch-cl{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:14px;padding:3px;display:none}
.hsrch-cl.v{display:block}
.srw{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border:1px solid rgba(8,145,178,.15);border-radius:var(--rl);box-shadow:0 8px 32px rgba(15,23,42,.12);overflow:hidden;display:none;z-index:300}
.srw.v{display:block}
.sri{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:.5px solid var(--bd)}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--sf)}
.hst{text-align:center;padding:0 10px;cursor:pointer}
.hst-n{font-family:"Playfair Display",serif;font-size:20px;font-weight:600;color:#fff;line-height:1}
.hst-l{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.hr{display:flex;align-items:center;gap:10px;margin-left:auto}
.vbtn{font-size:13px;font-weight:500;padding:8px 16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);cursor:pointer;color:rgba(255,255,255,.55);border-radius:var(--r);display:flex;align-items:center;gap:6px;transition:all .2s;font-family:"Nunito",sans-serif}
.vbtn.a{background:rgba(212,175,55,.14);border-color:rgba(212,175,55,.42);color:var(--gd)}
.vbtn:hover:not(.a){background:rgba(255,255,255,.1);color:#fff}
.rfbtn{font-size:11px;color:rgba(255,255,255,.28);cursor:pointer;background:none;border:none;padding:8px;border-radius:var(--r);transition:all .2s}
.rfbtn:hover{color:rgba(255,255,255,.6)}

.pw{max-width:var(--max);margin:0 auto;padding:0 28px;display:flex;min-height:calc(100vh - var(--hh))}
.sb{width:var(--sb);flex-shrink:0;padding:22px 10px 40px 0;border-right:1px solid rgba(212,175,55,.08);position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto}
.sb-lbl{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.14em;margin:18px 0 6px 10px}
.sb-lbl:first-child{margin-top:0}
.nb{width:100%;text-align:left;font-size:14px;padding:10px 12px;border:none;background:none;cursor:pointer;color:var(--t2);border-radius:var(--r);display:flex;align-items:center;gap:10px;transition:all .15s;font-family:"Nunito",sans-serif;margin-bottom:3px;font-weight:400}
.nb:hover:not(.a){background:rgba(212,175,55,.05);color:var(--nv)}
.nb.a{background:rgba(212,175,55,.09);color:var(--nv);font-weight:600;border-left:3px solid var(--gd);border-radius:0 var(--r) var(--r) 0;padding-left:11px}
.nb i{font-size:16px;flex-shrink:0;opacity:.5}
.nb.a i{opacity:1;color:var(--gd)}
.sbdiv{height:.5px;background:rgba(212,175,55,.1);margin:10px 10px}
.sb-st{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--r);cursor:pointer;transition:background .12s;margin-bottom:2px}
.sb-st:hover{background:rgba(212,175,55,.05)}
.sb-st-l{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:8px}
.sb-st-v{font-size:13px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-pm{width:100%;text-align:left;font-size:14px;padding:9px 12px;border:none;background:none;cursor:pointer;color:var(--t2);border-radius:var(--r);display:flex;align-items:center;gap:9px;transition:all .15s;font-family:"Nunito",sans-serif;margin-bottom:3px}
.sb-pm:hover:not(.a){background:var(--s2);color:var(--tx)}
.sb-pm.a{background:var(--s2);color:var(--tx);font-weight:600;border-left:2px solid var(--gd);border-radius:0 var(--r) var(--r) 0;padding-left:12px}
.pmav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--nv),var(--nm));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gd);flex-shrink:0;border:1px solid rgba(212,175,55,.22)}
.mgr{font-size:9px;padding:2px 6px;border-radius:10px;background:var(--s2);color:var(--t2);font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-left:3px}
.main{flex:1;padding:22px 0 40px 26px;min-width:0}
.tab{display:none}.tab.a{display:block}
.view{display:none}.view.a{display:block}

.card{border:1px solid var(--bd);border-radius:var(--rl);background:var(--cd);margin-bottom:10px;box-shadow:var(--gshadow);overflow:hidden;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 4px 20px rgba(15,23,42,.08);transform:translateY(-1px);border-color:var(--b2)}
.card-hd{display:flex;align-items:center;gap:9px;padding:13px 16px;background:var(--sf);cursor:pointer;position:relative}
.card-hd::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gd)}
.card-hd:hover{background:var(--s2)}
.card-bd{padding:15px 16px;border-top:1px solid var(--bd)}

.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;flex-shrink:0}
.bo{background:var(--ok);color:var(--ot)}.br{background:var(--er);color:var(--et)}.bw{background:var(--wn);color:var(--wt)}
.bd2{background:rgba(212,175,55,.1);color:#7a5500}.bp2{background:#eeedfe;color:#3c3489}
.bn{background:rgba(212,175,55,.08);color:var(--nv)}

.sel{font-size:13px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--b2);background:var(--cd);color:var(--tx);width:100%;font-family:"Nunito",sans-serif;cursor:pointer}
.sel:focus{outline:none;border-color:var(--gd)}
.sel.sa{background:var(--ok);color:var(--ot);border-color:var(--ob)}.sel.sc{background:var(--er);color:var(--et);border-color:var(--eb)}
.sel.si{background:rgba(212,175,55,.08);color:#7a5500;border-color:rgba(212,175,55,.3)}.sel.sw{background:var(--wn);color:var(--wt);border-color:var(--wb)}
.sel.ca{background:var(--ok);color:var(--ot);border-color:var(--ob)}.sel.cp{background:var(--er);color:var(--et);border-color:var(--eb)}
.sel.cpa{background:var(--wn);color:var(--wt);border-color:var(--wb)}.sel.cn{background:var(--s2);color:var(--t2)}

.hint{font-size:13.5px;color:var(--t2);padding:11px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;line-height:1.75}
.fb{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(8,145,178,.04);border:1px solid rgba(8,145,178,.15);border-radius:var(--rl);margin-bottom:12px}
.fb button{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--cd);cursor:pointer;color:var(--t2);font-family:"Nunito",sans-serif;display:flex;align-items:center;gap:4px}
.fb button:hover{background:var(--sf)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sf2{display:flex;flex-direction:column;gap:5px}
.sf2 label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.ni{width:100%;font-size:13.5px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--bd);background:var(--cd);color:var(--tx);resize:vertical;min-height:52px;font-family:"Nunito",sans-serif;line-height:1.65}
.ni:focus{outline:none;border-color:var(--gd);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.snb{font-size:13px;padding:6px 14px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--t2);font-family:"Nunito",sans-serif;margin-top:6px}
.snb:hover{background:var(--s2);border-color:var(--b2)}
.prb{font-size:13px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:7px;font-family:"Nunito",sans-serif;margin-top:8px;transition:all .15s}
.prb:hover{background:var(--s2);color:var(--tx)}
.tps{background:var(--sf);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border:1px solid var(--bd)}
.tpb{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.tpf{height:100%;background:var(--gd);border-radius:3px;transition:width .4s}
.btn{font-size:13.5px;padding:10px 20px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--gd),var(--gl));color:#1a1000;cursor:pointer;font-family:"Nunito",sans-serif;font-weight:600;letter-spacing:.02em}
.btn2{font-size:13px;padding:9px 14px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--t2);font-family:"Nunito",sans-serif}
.ab{font-size:13.5px;padding:10px 17px;border-radius:var(--r);border:1px solid rgba(212,175,55,.25);background:rgba(212,175,55,.04);cursor:pointer;color:var(--nv);display:flex;align-items:center;gap:8px;font-weight:500;margin-bottom:14px;font-family:"Nunito",sans-serif}
.ab:hover{background:rgba(212,175,55,.1)}
.af2{border:1px solid var(--bd);border-radius:var(--rl);background:var(--sf);padding:18px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:12px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.fl input,.fl select,.fl textarea{font-size:13.5px;padding:9px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--cd);color:var(--tx);width:100%;font-family:"Nunito",sans-serif;line-height:1.55}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--gd);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.fl textarea{resize:vertical;min-height:56px}
.db2{font-size:12px;padding:4px 9px;border-radius:var(--r);border:.5px solid var(--eb);background:transparent;cursor:pointer;color:var(--et);display:flex;align-items:center;gap:3px;flex-shrink:0}
.db2:hover{background:var(--er)}

.cls-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ct{font-size:12.5px;font-weight:500;padding:8px 13px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf);cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:"Nunito",sans-serif;transition:all .15s}
.ct:hover{border-color:rgba(212,175,55,.3);background:rgba(212,175,55,.04)}
.ct.a{background:linear-gradient(135deg,var(--nv),var(--nm));color:var(--gd);border-color:transparent;font-weight:600}
.ct .tp{font-size:11px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.15);margin-left:2px}
.ct:not(.a) .tp{background:var(--s2);color:var(--t3)}
.ci{display:flex;align-items:flex-start;gap:12px;padding:11px 12px;border-radius:var(--r);margin-bottom:4px;cursor:pointer;border:.5px solid transparent;transition:all .15s}
.ci:hover{background:rgba(212,175,55,.04);border-color:rgba(212,175,55,.18)}
.ci.dn{opacity:.62}.ci.dn .ctit{text-decoration:line-through}
.ccb{width:19px;height:19px;border:1.5px solid var(--b2);border-radius:5px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center}
.ci.dn .ccb{background:var(--ok);border-color:var(--ob)}
.cnum{font-size:11px;font-weight:500;color:var(--t3);min-width:24px;margin-top:4px;flex-shrink:0}
.cbody{flex:1}
.ctit{font-size:14.5px;font-weight:500;margin-bottom:4px;line-height:1.45}
.cnote{font-size:13px;color:var(--t2);line-height:1.7;background:var(--sf);border-radius:var(--r);padding:8px 11px;margin-top:5px;border-left:2px solid var(--bd)}
.cch{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.sch{font-size:12.5px;padding:5px 12px;border-radius:20px;border:.5px solid var(--b2);cursor:pointer;font-weight:500;background:var(--sf);color:var(--t2);transition:all .15s;font-family:"Nunito",sans-serif}
.sch.ns{background:var(--er);color:var(--et);border-color:var(--eb)}.sch.ip{background:var(--wn);color:var(--wt);border-color:var(--wb)}.sch.up{background:var(--ok);color:var(--ot);border-color:var(--ob)}

.dbrow{display:flex;align-items:center;gap:12px;padding:9px 10px;border-bottom:.5px solid var(--bd);cursor:pointer;border-radius:var(--r);margin:2px 0;transition:background .12s,transform .1s}
.dbrow:last-child{border-bottom:none}
.dbrow:not(.z):hover{background:rgba(212,175,55,.05);transform:translateX(4px)}
.dbrow:not(.z):hover .darr{opacity:1}
.dbrow.z{cursor:default}
.dbrl{font-size:13.5px;font-weight:500;min-width:162px;flex-shrink:0;display:flex;align-items:center;gap:8px}
.dbrb{flex:1;height:8px;background:var(--s2);border-radius:4px;overflow:hidden}
.dbrf{height:100%;border-radius:4px;transition:width .5s}
.dbrc{font-size:13.5px;font-weight:600;min-width:28px;text-align:right;flex-shrink:0}
.dbrr{font-size:12.5px;color:var(--t3);min-width:70px;text-align:right;flex-shrink:0}
.darr{font-size:13px;color:var(--gd);flex-shrink:0;opacity:0;transition:opacity .12s}
.ds{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:12px;box-shadow:var(--gshadow)}
.dt{font-family:"Playfair Display",serif;font-size:18px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:9px;letter-spacing:.01em}
.d2c{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dbs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.dbc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;text-align:center;box-shadow:var(--gshadow);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.dbc:hover{box-shadow:0 4px 20px rgba(15,23,42,.08);transform:translateY(-2px);border-color:var(--b2)}
.dbc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.dbc.g::before{background:var(--gd)}.dbc.gr::before{background:#10B981}
.dbc.b::before{background:var(--bd) repeating-linear-gradient(90deg,var(--gd) 0,var(--gd) 100%)}.dbc.r::before{background:#E11D48}
.dbc.g::before{background:#0891B2}.dbc.gr::before{background:#10B981}.dbc.b::before{background:#6366F1}.dbc.r::before{background:#E11D48}
.dbn{font-family:"Playfair Display",serif;font-size:26px;font-weight:600;line-height:1;margin-bottom:4px}
.ts{font-size:12px;color:var(--t3);text-align:right;margin-bottom:14px;font-style:italic}
.pbar{height:2px;background:rgba(15,23,42,.06)}
.pfil{height:100%;background:var(--gd);transition:width .4s;border-radius:inherit}
.fi{display:flex;align-items:flex-start;gap:12px;padding:10px 11px;border-radius:var(--r);margin-bottom:3px;transition:background .15s}
.fi:hover{background:var(--sf)}
.fb2{font-size:12.5px;padding:5px 11px;border-radius:20px;border:.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);font-family:"Nunito",sans-serif;font-weight:500}
.fb2.pass{background:var(--ok);color:var(--ot);border-color:var(--ob)}.fb2.fail{background:var(--er);color:var(--et);border-color:var(--eb)}
.prsel{margin-bottom:14px}
.prsel label{font-size:12px;font-weight:600;color:var(--t3);display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.09em}
.prsel select{font-size:14px;padding:10px 13px;border-radius:var(--r);border:.5px solid var(--b2);background:var(--cd);color:var(--tx);width:100%;font-family:"Nunito",sans-serif}
.wf{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.wb{padding:9px 13px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf);font-size:12.5px;font-weight:500;color:var(--t2);text-align:center;min-width:96px;line-height:1.45;flex-shrink:0}
.wb.a{background:linear-gradient(135deg,var(--nv),var(--nm));color:var(--gd);border-color:transparent}
.wb.d{background:var(--ok);color:var(--ot);border-color:var(--ob)}
.wa{font-size:18px;color:rgba(212,175,55,.38);padding:0 5px;flex-shrink:0}
.prsb{border:1px solid var(--gborder);border-radius:var(--rl);padding:17px;background:var(--glass);margin-bottom:14px;box-shadow:var(--gshadow)}
.prg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:13px}
.prs{background:var(--sf);border-radius:var(--r);padding:12px;text-align:center;border:1px solid var(--bd)}
.prn{font-family:"Playfair Display",serif;font-size:26px;font-weight:600}
.prl{font-size:13px;color:var(--t3);margin-top:3px}
.sc-card{margin-bottom:10px;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--gshadow)}
.sc-hd{padding:12px 16px;background:var(--sf);display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bd)}
.sc-bd{padding:12px 16px;background:var(--cd)}
.rw{display:flex;gap:14px;padding:10px 0;border-bottom:.5px solid var(--bd)}
.rw:last-child{border-bottom:none}
.rl{font-size:13.5px;font-weight:600;width:200px;flex-shrink:0;padding-top:1px;color:var(--nv)}
.rv{font-size:14px;color:var(--t2);flex:1;line-height:1.75}
.pmc{display:flex;align-items:center;gap:13px;padding:14px 17px;background:var(--glass);border:1px solid var(--gborder);border-radius:var(--rl);margin-bottom:10px;box-shadow:var(--gshadow)}
.pma{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--nv),var(--nm));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--gd);flex-shrink:0;border:1px solid rgba(212,175,55,.22)}

async function api(p){
  if(!SCRIPT_URL||SCRIPT_URL==='YOUR_URL')return null;
  const url=SCRIPT_URL+'?'+Object.entries(p).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  try{const r=await fetch(url,{redirect:'follow',cache:'no-cache'});const t=await r.text();if(t.trim().startsWith('<'))return null;return JSON.parse(t);}
  catch(e){return null;}
}
function si(msg,type){const el=document.getElementById('sync');el.textContent=msg;el.className='show '+(type||'');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);}

function apd(data){
  P=(data.projects||[]).map(p=>({...p,pilot:p.pilot===true||p.pilot==='true'}));
  if(!P.length)P=DP.map(p=>({...p}));
  CL={};(data.checklist||[]).forEach(r=>{CL[r.pid+'_'+r.iid]={done:r.done==='true',st:r.st||''};});
  PR={};(data.postReview||[]).forEach(r=>{PR[r.pid+'_'+r.iid]=r.val||'none';});
  const pm=(data.settings||[]).find(r=>r.key==='pmList');
  PML=pm?pm.val.split(',').filter(Boolean):[...DPM];
}
async function bgRefresh(){
  const data=await api({action:'getAll'});
  if(!data||data.error){si('Sheet unreachable','err');return;}
  apd(data);sc(data);si('Synced with Google Sheets','ok');ra();
}
async function loadData(){
  const cached=lc();
  if(cached){apd(cached.data);}
  else{P=DP.map(p=>({...p}));CL={};PR={};PML=[...DPM];}
  if(!activePM)activePM=PML[0];
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  ra();

    if(cached){const age=Math.round((Date.now()-cached.ts)/60000);si(`Syncing... (${age}m ago)`,'');}
    else si('Connecting to Google Sheets...','');
    bgRefresh();
  }
}

function ppx(pid){const d=ACI.filter(i=>cdone(pid,i.id)||(i.hs&&cst(pid,i.id)==='up')).length;return{d,t:ACI.length,pct:Math.round(d/ACI.length*100)};}
function prSt(p,i){return PR[p+'_'+i]||'none';}
function gprs(pid){return{t:APRI.length,pa:APRI.filter(i=>prSt(pid,i.id)==='pass').length,fa:APRI.filter(i=>prSt(pid,i.id)==='fail').length,re:APRI.filter(i=>prSt(pid,i.id)==='none').length};}
function ssc(v){if(v==='Approved')return 'sa';if(v==='Further Part II information requested')return 'sc';if(v==='Under Inspection')return 'si';if(v==='Part II Submitted')return 'sw';return '';}
function csc(v){if(v==='Addressed')return 'ca';if(v==='Pending')return 'cp';if(v==='Partially addressed')return 'cpa';return 'cn';}

function tcl(pid,iid){const k=pid+'_'+iid;CL[k]={done:!(CL[k]?.done||false),st:CL[k]?.st||''};ra();api({action:'setCL',pid,iid,done:CL[k].done,st:CL[k].st});}
function tcs(pid,iid,v){const k=pid+'_'+iid;const ns=(CL[k]?.st||'')=== v?'':v;CL[k]={done:CL[k]?.done||false,st:ns};ra();api({action:'setCL',pid,iid,done:CL[k].done,st:ns});}
function setPR(pid,iid,val){PR[pid+'_'+iid]=val;rpr();api({action:'setPR',pid,iid,val});}
function tprs(id){openCards['_pr_'+id]=openCards['_pr_'+id]===false?true:false;rpr();}
function tp(pid){openCards[pid]=openCards[pid]===false?true:false;rp();rtv();}
function upf(pid,f,v){const p=P.find(x=>x.id===pid);if(!p)return;p[f]=v;rp();rdb();rss();api({action:'upsertProject',data:JSON.stringify(p)});}
function spp(pid,pm){const p=P.find(x=>x.id===pid);if(!p)return;p.pm=pm;rp();rtv();rdb();api({action:'upsertProject',data:JSON.stringify(p)});}
function spn(pid){const ce=document.getElementById('cn-'+pid),me=document.getElementById('mn-'+pid),p=P.find(x=>x.id===pid);if(!p)return;if(ce)p.corr=ce.value;if(me)p.cmt=me.value;rp();api({action:'upsertProject',data:JSON.stringify(p)});}
function rmP(pid){if(!confirm('Remove '+pid+'?'))return;P=P.filter(p=>p.id!==pid);ra();api({action:'deleteProject',id:pid});}
function aP(){
  const id=document.getElementById('ni-id').value.trim();
  if(!id||P.find(p=>p.id===id)){alert(!id?'ID required.':'ID exists.');return;}
  const proj={id,py:document.getElementById('ni-py').value,sub:document.getElementById('ni-sub').value||'—',pilot:document.getElementById('ni-pi').value==='yes',ps:document.getElementById('ni-ps').value,cs:document.getElementById('ni-cs').value,recs:document.getElementById('ni-r').value||'—',ut:document.getElementById('ni-ut').value,corr:document.getElementById('ni-corr').value,cmt:document.getElementById('ni-cmt').value,pm:document.getElementById('ni-pm').value};
  P.unshift(proj);showAF=false;ra();api({action:'upsertProject',data:JSON.stringify(proj)});
}
function apm(){const n=document.getElementById('npm').value.trim();if(!n)return;if(PML.map(x=>x.toLowerCase()).includes(n.toLowerCase())){alert('PM exists.');return;}PML=[...PML,n];showPMAF=false;rset();rtv();api({action:'setPMs',data:JSON.stringify(PML)});}
function dpm(n){if(n===MGR){alert('Mary cannot be removed.');return;}if(!confirm('Remove '+n+'?'))return;PML=PML.filter(x=>x!==n);P.filter(p=>p.pm===n).forEach(p=>{p.pm='';api({action:'upsertProject',data:JSON.stringify(p)});});rset();rtv();api({action:'setPMs',data:JSON.stringify(PML)});}

function fpg(){if(!AF)return P;const{t,v}=AF;if(t==='all')return P;if(t==='ps')return P.filter(p=>p.ps===v);if(t==='cs')return P.filter(p=>p.cs===v);if(t==='py')return P.filter(p=>p.py===v);if(t==='pilot')return P.filter(p=>String(p.pilot)===v);if(t==='ut')return P.filter(p=>(p.ut||'')===v);if(t==='pm')return P.filter(p=>p.pm===v);return P;}
function fg(t,v,label,count){if(count===0&&t!=='all')return;AF={t,v,label};ntid('n-projects');document.querySelectorAll('#v-spl .nb').forEach((b,i)=>b.classList.toggle('a',i===1));rp();}
function cf(){AF=null;rp();}
function fgpm(pm,c){if(c===0)return;svid('team');activePM=pm;rtv();}

function rss(){
  const tr=P.reduce((a,p)=>a+rv(p),0);
  const app=P.filter(p=>p.ps==='Approved').length;
  const nc=P.filter(p=>p.ps==='Further Part II information requested').length;
  const ui=P.filter(p=>p.ps==='Under Inspection').length;
  const pend=P.filter(p=>p.cs==='Pending').length;
  function animCount(id,val,pre='',suf=''){
    const el=document.getElementById(id);if(!el)return;
    const dur=700;const start=performance.now();
    function step(now){const p=Math.min((now-start)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(val*e)+suf;if(p<1)requestAnimationFrame(step);else el.textContent=pre+val+suf;}
    requestAnimationFrame(step);
  }
  animCount('sp1-n',P.length);
  animCount('sp2-n',app);
  animCount('sp3-n',ui);
  animCount('sp4-n',nc);
  animCount('sp5-n',Math.round(tr/1000),'$','K');
  // Monthly REC target progress
  const TARGET=2000000;
  const pct=Math.min(Math.round(tr/TARGET*100),100);
  const remaining=Math.max(TARGET-tr,0);
  const fillEl=document.getElementById('sp-fill');
  const pctEl=document.getElementById('sp-pct');
  const subEl=document.getElementById('sp-sub');
  if(fillEl)setTimeout(()=>{fillEl.style.width=pct+'%';},100);
  if(pctEl){
    const dur=900;const start=performance.now();
    function animPct(now){const p=Math.min((now-start)/dur,1);const e=1-Math.pow(1-p,3);pctEl.textContent=Math.round(pct*e)+'%';if(p<1)requestAnimationFrame(animPct);}
    requestAnimationFrame(animPct);
  }
  if(subEl)subEl.textContent=pct>=100?'Target reached! 🎉':'$'+remaining.toLocaleString()+' remaining to reach $2M';
  const s1=document.getElementById('sp1');if(s1)s1.onclick=()=>fg('all','all','All projects',P.length);
  const s2=document.getElementById('sp2');if(s2)s2.onclick=()=>fg('ps','Approved','Approved',app);
  const s3=document.getElementById('sp3');if(s3)s3.onclick=()=>fg('ps','Under Inspection','Under inspection',ui);
  const s4=document.getElementById('sp4');if(s4)s4.onclick=()=>fg('ps','Further Part II information requested','Need correction',nc);
  // Update sidebar stats too
  document.getElementById('sbst').innerHTML=
    '<div class="sb-st" data-f="0"><span class="sb-st-l"><span class="dot" style="background:#0891B2"></span>All projects</span><span class="sb-st-v">'+P.length+'</span></div>'+
    '<div class="sb-st" data-f="1"><span class="sb-st-l"><span class="dot" style="background:#10B981"></span>Approved</span><span class="sb-st-v" style="color:var(--ot)">'+app+'</span></div>'+
    '<div class="sb-st" data-f="2"><span class="sb-st-l"><span class="dot" style="background:#0891B2"></span>Under inspection</span><span class="sb-st-v">'+ui+'</span></div>'+
    '<div class="sb-st" data-f="3"><span class="sb-st-l"><span class="dot" style="background:var(--et)"></span>Need correction</span><span class="sb-st-v" style="color:var(--et)">'+nc+'</span></div>'+
    '<div class="sb-st" data-f="4"><span class="sb-st-l"><span class="dot" style="background:var(--wb)"></span>Corr. pending</span><span class="sb-st-v">'+pend+'</span></div>';
  const fns=[()=>fg('all','all','All projects',P.length),()=>fg('ps','Approved','Approved',app),()=>fg('ps','Under Inspection','Under inspection',ui),()=>fg('ps','Further Part II information requested','Need correction',nc),()=>fg('cs','Pending','Corr. pending',pend)];
  document.querySelectorAll('#sbst .sb-st').forEach((el,i)=>{el.addEventListener('click',fns[i]);});


  const stats=[
    {dot:'#4a9abe',label:'All projects',val:P.length,style:'',fn:()=>fg('all','all','All projects',P.length)},
    {dot:'#2e8b35',label:'Approved',val:app,style:'color:var(--ot)',fn:()=>fg('ps','Approved','Approved',app)},
    {dot:'#4a9abe',label:'Under inspection',val:ui,style:'',fn:()=>fg('ps','Under Inspection','Under inspection',ui)},
    {dot:'#c93030',label:'Correction req.',val:nc,style:'color:var(--et)',fn:()=>fg('ps','Further Part II information requested','Correction req.',nc)},
    {dot:'#D97706',label:'Corr. pending',val:pend,style:'',fn:()=>fg('cs','Pending','Corr. pending',pend)},
  ];
  const el=document.getElementById('sbst');
  el.innerHTML=stats.map((s,i)=>`<div class="sb-st" data-si="${i}"><span class="sb-st-l"><span class="dot" style="background:${s.dot}"></span>${s.label}</span><span class="sb-st-v" style="${s.style}">${s.val}</span></div>`).join('');
  stats.forEach((s,i)=>{
    const d=el.querySelector(`[data-si="${i}"]`);
    if(d)d.addEventListener('click',s.fn);
  });
}

function dbRow(label,n,recs,color,max,fn){
  const w=max>0?Math.round(n/max*100):0;
  const el=document.createElement('div');
  el.className='dbrow'+(n===0?' z':'');
  el.innerHTML=`<div class="dbrl"><span style="width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>${label}</div><div class="dbrb"><div class="dbrf" style="width:${w}%;background:${color}"></div></div><div class="dbrc">${n}</div><div class="dbrr">${fr(recs)}</div><i class="ti ti-arrow-right darr"></i>`;
  if(n>0&&fn)el.addEventListener('click',fn);
  return el.outerHTML;
}

function rtn(){
  const docs=[{n:'[1]',t:'Permit',v:'Officially approved permit only. Not a draft or expired version.'},{n:'[2]',t:'PTO / COC',v:'Must include date of approval AND ComEd representative signature. Both required.'},{n:'[3]',t:'Net metering',v:'Correct document matching project address and utility account.'},{n:'[4]',t:'PJM / SO SS',v:'Compile multiple photos into ONE PDF before uploading.'},{n:'[5]',t:'JCO (site suitability)',v:'All photos complete and accurate. Escalate missing/unclear to Yen.'},{n:'[6]',t:'Inverter & module label photos',v:'Upload clear separate photos, then merge into a single file.'},{n:'[7]',t:'Complete array photos',v:'Separate complete array photos for each project.'},{n:'[8]',t:'Updated SSR',v:'Reflect all mitigations in pipeline review, plan set, and installation work.'},{n:'[9]',t:'Upgrade photos',v:'If applicable, submit separately to ILSFA portal — not just JCO photos.'},{n:'[10]',t:'Mitigation final invoice',v:'Pilot only. Electrical scope must match Part I Initial Invoice.'},{n:'[11]',t:'Shading study',v:'Must be consistent with installed system — panel count, layout, orientation.'},{n:'[12]',t:'System design',v:'Plan set must match installed system and final shade study.'},{n:'[13]',t:'ACF',v:'Update ONLY if revised value is LOWER than original.'},{n:'[14]',t:'Arrays',v:'Part I arrays must NOT be edited or deleted.'},{n:'[15]',t:'REC table',v:'All Part II Submitted values must match the final shade study.'},{n:'[16]',t:'Inspection document',v:'Correct approved inspection document only.'},{n:'[17]',t:'JCO (post construction)',v:'All photos complete and accurate. Escalate to Yen if needed.'},{n:'[18]',t:'SS from Fox / Tesla monitoring app',v:'System must NOT show 0 production. If offline — notify PM immediately.'},{n:'[19]',t:'Shadi / Qais affidavit',v:'Upload in the correct field under the Staff Info tab.'},{n:'[20]',t:'Start / end dates',v:'Start = day BEFORE install. End = actual install completion date.'}];
  document.getElementById('pmc').innerHTML='<div class="hint">Detailed instructions for each of the 20 required documents.</div>'+docs.map(x=>`<div class="sc-card"><div class="sc-hd"><span style="font-size:12px;font-weight:600;color:var(--gd);min-width:32px">${x.n}</span><span style="font-size:14.5px;font-weight:600;flex:1">${x.t}</span></div><div class="sc-bd"><span style="font-size:14px;color:var(--t2);line-height:1.75">${x.v}</span></div></div>`).join('');
}

function rpr(){
  const pid=prPid||(P.length?P[0].id:'');
  if(!pid){document.getElementById('n-postreview').innerHTML='<div class="hint">No projects.</div>';return;}
  const{t,pa,fa,re}=gprs(pid);const pct=Math.round(pa/t*100);const{pct:cp,d:cd,t:ct}=ppx(pid);
  const el=document.getElementById('n-postreview');
  el.innerHTML=`
    <div class="prsel"><label>Select project to review</label>
      <select id="pr-sel"><option value="">—</option>${P.map(p=>{const{fa:f}=gprs(p.id);const{pct:cp2}=ppx(p.id);return `<option value="${p.id}"${p.id===pid?' selected':''}>${p.id}${p.pm?' ('+p.pm+')':''} — team ${cp2}%${f>0?' ⚠':''}</option>`;}).join('')}</select>
    </div>
    <div class="wf"><div class="wb d">Team submits</div><div class="wa">›</div><div class="wb a">Post-review</div><div class="wa">›</div><div class="wb">ILSFA review</div><div class="wa">›</div><div class="wb">Approved</div></div>
    <div style="background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.15);border-radius:var(--rl);padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:14px">
      <div style="flex:1"><div style="font-size:13.5px;font-weight:600;margin-bottom:7px;color:var(--nv)">Team checklist — ${pid}</div><div class="pbar"><div class="pfil" style="width:${cp}%"></div></div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-family:Playfair Display,serif;font-size:22px;font-weight:600">${cp}%</div><div style="font-size:13px;color:var(--t3)">${cd}/${ct}</div></div>
    </div>
    <div class="prsb">
      <div style="font-family:Playfair Display,serif;font-size:18px;font-weight:600">${pid} — Post-review summary</div>
      <div class="prg">
        <div class="prs"><div class="prn" style="color:var(--ot)">${pa}</div><div class="prl">Passed</div></div>
        <div class="prs"><div class="prn" style="color:var(--et)">${fa}</div><div class="prl">Failed</div></div>
        <div class="prs"><div class="prn">${re}</div><div class="prl">Not reviewed</div></div>
      </div>
      <div style="margin-top:13px"><div class="pbar"><div class="pfil" style="width:${pct}%"></div></div><div style="font-size:13px;color:var(--t3);margin-top:4px">${pct}% passed</div></div>
    </div>
    <div id="pr-sects"></div>`;

  document.getElementById('pr-sel').addEventListener('change',function(){prPid=this.value;rpr();});

  PRS.forEach(s=>{
    const sp=s.items.filter(i=>prSt(pid,i.id)==='pass').length;
    const sf=s.items.filter(i=>prSt(pid,i.id)==='fail').length;
    const op=openCards['_pr_'+s.id]!==false;
    const div=document.createElement('div');
    div.style.cssText='margin-bottom:12px;border:1px solid var(--gborder);border-radius:var(--rl);overflow:hidden;box-shadow:var(--gshadow)';
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;padding:13px 17px;cursor:pointer;background:rgba(248,250,252,.78)" data-sid="${s.id}">
        <i class="ti ${s.ic}" style="font-size:17px;color:var(--gd)"></i>
        <span style="font-size:14.5px;font-weight:600;flex:1">${s.t}</span>
        <span style="display:flex;gap:6px;align-items:center">${sp>0?`<span class="badge bo">${sp}</span>`:''}${sf>0?`<span class="badge br">${sf} failed</span>`:''}<span style="font-size:13px;color:var(--t3)">${s.items.length}</span></span>
        <i class="ti ti-chevron-down" style="font-size:14px;color:var(--t3);transform:rotate(${op?180:0}deg);margin-left:6px" id="chv-${s.id}"></i>
      </div>
      <div class="pbar"><div class="pfil" style="width:${Math.round(sp/s.items.length*100)}%"></div></div>
      <div id="prs-${s.id}" style="display:${op?'block':'none'};padding:10px 17px 15px;background:rgba(255,255,255,.88)"></div>`;
    
    const hdr=div.querySelector(`[data-sid="${s.id}"]`);
    hdr.addEventListener('click',()=>{
      openCards['_pr_'+s.id]=openCards['_pr_'+s.id]===false?true:false;
      const body=div.querySelector(`#prs-${s.id}`);
      const chv=div.querySelector(`#chv-${s.id}`);
      const isOpen=openCards['_pr_'+s.id]!==false;
      body.style.display=isOpen?'block':'none';
      chv.style.transform=`rotate(${isOpen?180:0}deg)`;
    });

    const body=div.querySelector(`#prs-${s.id}`);
    body.innerHTML=s.items.map(it=>{
      const st=prSt(pid,it.id);
      return `<div class="fi">
        <div style="flex:1"><div style="font-size:14px;font-weight:500">${it.t}</div><div style="font-size:13.5px;color:var(--t2);margin-top:3px;line-height:1.6">${it.n}</div></div>

          <button class="fb2${st==='fail'?' fail':''}" data-pid="${pid}" data-iid="${it.id}" data-cur="${st}" data-action="fail"><i class="ti ti-x" style="font-size:12px"></i> Fail</button>
        </div></div>`;
    }).join('');

    body.querySelectorAll('.fb2').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const newVal=btn.dataset.cur===btn.dataset.action?'none':btn.dataset.action;

function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:rgba(212,175,55,.25);color:inherit;border-radius:2px;padding:0 2px">$1</mark>');}

function hs(q){
  const t=q.trim();document.getElementById('gsc').classList.toggle('v',t.length>0);
  const w=document.getElementById('srw');
  if(t.length<2){w.classList.remove('v');return;}
  const ql=t.toLowerCase();const rs=[];
  P.forEach(p=>{if([p.id,p.py,p.sub,p.recs,p.ps,p.cs,p.ut||'',p.corr,p.cmt,p.pm||''].join(' ').toLowerCase().includes(ql)){rs.push({ic:'ti-folder',t:`${p.id} — ${p.py}${p.pm?' ('+p.pm+')':''}`,s:`${p.ps} · ${p.recs}`,fn:()=>op2(p.id)});}});
  PML.forEach(pm=>{if(pm.toLowerCase().includes(ql)){rs.push({ic:'ti-user',t:pm+(pm===MGR?' (Manager)':''),s:P.filter(p=>p.pm===pm).length+' projects',fn:()=>fgpm(pm,P.filter(p=>p.pm===pm).length)});}});
  w.classList.add('v');document.getElementById('src').textContent=rs.length+' result'+(rs.length!==1?'s':'');
  const srb=document.getElementById('srb');
  if(!rs.length){srb.innerHTML=`<div style="padding:20px;text-align:center;color:var(--t3);font-size:14px">No results</div>`;return;}
  srb.innerHTML=rs.map((r,i)=>`<div class="sri" data-ri="${i}"><i class="ti ${r.ic}" style="font-size:15px;color:var(--gd);flex-shrink:0;margin-top:1px"></i><div style="flex:1"><div style="font-size:14px;font-weight:500;margin-bottom:1px">${hl(r.t,t)}</div><div style="font-size:13px;color:var(--t2)">${hl(r.s,t)}</div></div></div>`).join('');
  rs.forEach((r,i)=>{const el=srb.querySelector(`[data-ri="${i}"]`);if(el)el.addEventListener('click',()=>{r.fn();cs();});});
}

function cs(){document.getElementById('gs').value='';document.getElementById('srw').classList.remove('v');document.getElementById('gsc').classList.remove('v');}
function op2(pid){cs();openCards[pid]=true;const v=document.querySelector('.view.a').id;if(v==='v-spl'){ntid('n-projects');document.querySelectorAll('#v-spl .nb').forEach((b,i)=>b.classList.toggle('a',i===1));rp();}else{const pm=P.find(p=>p.id===pid)?.pm;if(pm){activePM=pm;rtv();}else rtv();}}

function ntid(id){
  document.querySelectorAll('#v-spl .tab').forEach(t=>t.classList.remove('a'));
  document.querySelectorAll('#v-spl .nb').forEach(b=>b.classList.remove('a'));
  document.getElementById(id).classList.add('a');
  const m={'n-dashboard':0,'n-projects':1,'n-postreview':2,'n-standards':3,'n-settings':4};
  const btns=document.querySelectorAll('#v-spl .nb');
  if(btns[m[id]])btns[m[id]].classList.add('a');
}
function nt(id,btn){
  document.querySelectorAll('#v-spl .tab').forEach(t=>t.classList.remove('a'));
  document.querySelectorAll('#v-spl .nb').forEach(b=>b.classList.remove('a'));
  document.getElementById('n-'+id).classList.add('a');btn.classList.add('a');
  if(id==='dashboard')rdb();
}
function sv(v,btn){
  document.querySelectorAll('.view').forEach(x=>{x.classList.remove('a');x.style.display='none';});
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('a'));
  document.getElementById('v-'+v).classList.add('a');document.getElementById('v-'+v).style.display='flex';btn.classList.add('a');
}
function svid(v){
  document.querySelectorAll('.view').forEach(x=>{x.classList.remove('a');x.style.display='none';});
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('a'));
  document.getElementById('v-'+v).classList.add('a');document.getElementById('v-'+v).style.display='flex';
  document.querySelectorAll('.vbtn')[v==='spl'?0:1].classList.add('a');
}
function ra(){rss();rdb();rp();rpr();rstd();rset();rtv();}
loadData();

</script>
